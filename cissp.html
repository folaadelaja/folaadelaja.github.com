            explanation: "OWASP is a nonprofit foundation providing guidance on web application security."
        }
    ];

    // App State
    let state = {
        currentView: 'dashboard',
        currentQuestionIndex: 0,
        selectedAnswers: {},
        bookmarked: new Set(),
        examMode: false,
        timeLeft: null,
        selectedDomain: null,
        selectedDifficulty: null,
        progress: {},
        examStarted: false
    };

    // Load data from localStorage
    function loadData() {
        const saved = localStorage.getItem('cissp_data');
        if (saved) {
            const data = JSON.parse(saved);
            state.selectedAnswers = data.selectedAnswers || {};
            state.bookmarked = new Set(data.bookmarked || []);
            state.progress = data.progress || {};
        }
    }

    // Save data to localStorage
    function saveData() {
        localStorage.setItem('cissp_data', JSON.stringify({
            selectedAnswers: state.selectedAnswers,
            bookmarked: [...state.bookmarked],
            progress: state.progress
        }));
    }

    // Calculate statistics
    function getStats() {
        const questionsAnswered = Object.keys(state.selectedAnswers).length;
        const correctAnswers = Object.values(state.progress).filter(p => p.correct).length;
        const accuracy = questionsAnswered > 0 ? ((correctAnswers / questionsAnswered) * 100).toFixed(1) : 0;

        const domainStats = {};
        CISSP_QUESTIONS.forEach(q => {
            if (!domainStats[q.domain]) {
                domainStats[q.domain] = { total: 0, correct: 0 };
            }
            domainStats[q.domain].total++;
            if (state.progress[q.id]?.correct) {
                domainStats[q.domain].correct++;
            }
        });

        return {
            questionsAnswered,
            correctAnswers,
            accuracy,
            domainStats
        };
    }

    // Update header stats
    function updateHeader() {
        const stats = getStats();
        document.getElementById('statsAnswered').textContent = stats.questionsAnswered;
        document.getElementById('statsCorrect').textContent = stats.correctAnswers;
        document.getElementById('statsAccuracy').textContent = stats.accuracy + '%';
    }

    // Get filtered questions
    function getFilteredQuestions() {
        return CISSP_QUESTIONS.filter(q => {
            if (state.selectedDomain && q.domain !== state.selectedDomain) return false;
            if (state.selectedDifficulty && q.difficulty !== state.selectedDifficulty) return false;
            return true;
        });
    }

    // Render Dashboard View
    function renderDashboard() {
        const stats = getStats();
        const html = `
            <div class="dashboard">
                <div class="dashboard-card">
                    <div class="dashboard-card-title">Total Questions Practiced</div>
                    <div class="dashboard-card-value">${stats.questionsAnswered}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${Math.min((stats.questionsAnswered / 250) * 100, 100)}%"></div>
                    </div>
                </div>
                <div class="dashboard-card">
                    <div class="dashboard-card-title">Overall Accuracy</div>
                    <div class="dashboard-card-value">${stats.accuracy}%</div>
                    <div class="dashboard-card-subtitle">${stats.correctAnswers} of ${stats.questionsAnswered} correct</div>
                </div>
                <div class="dashboard-card">
                    <div class="dashboard-card-title">Domains Mastered</div>
                    <div class="dashboard-card-value">${Object.values(stats.domainStats).filter(d => d.correct === d.total).length}</div>
                    <div class="dashboard-card-subtitle">out of ${Object.keys(stats.domainStats).length} domains</div>
                </div>
                <div class="dashboard-card">
                    <div class="dashboard-card-title">Estimated Readiness</div>
                    <div class="dashboard-card-value">
                        ${stats.accuracy >= 75 ? '✅ Ready' : stats.accuracy >= 60 ? '🟡 Getting Close' : '🔄 Keep Studying'}
                    </div>
                    <div class="dashboard-card-subtitle">Based on current performance</div>
                </div>
            </div>

            <div class="question-card">
                <h3 style="margin-bottom: 20px; color: var(--primary);">Performance by Domain</h3>
                ${Object.entries(stats.domainStats).map(([domain, data]) => `
                    <div style="margin-bottom: 20px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="font-size: 14px;">${domain}</span>
                            <span style="color: var(--primary); font-weight: 600;">${data.correct}/${data.total}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${(data.correct / data.total) * 100}%"></div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        document.getElementById('contentArea').innerHTML = html;
    }

    // Render Practice View
    function renderPractice() {
        const questions = getFilteredQuestions();
        const domains = [...new Set(CISSP_QUESTIONS.map(q => q.domain))];
        const difficulties = ['easy', 'medium', 'hard'];
        
        if (questions.length === 0) {
            document.getElementById('contentArea').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📚</div>
                    <div class="empty-state-title">No Questions Match Your Filters</div>
                    <p>Try adjusting your filters</p>
                </div>
            `;
            return;
        }

        const question = questions[state.currentQuestionIndex];
        const selectedAnswer = state.selectedAnswers[question.id];

        const html = `
            <div class="filters">
                <span style="font-size: 12px; color: var(--text-secondary); align-self: center; text-transform: uppercase; font-weight: 600; margin-right: 10px;">Domain:</span>
                <button class="filter-chip ${!state.selectedDomain ? 'active' : ''}" onclick="setDomain(null)">All Domains</button>
                ${domains.map(domain => `
                    <button class="filter-chip ${state.selectedDomain === domain ? 'active' : ''}" onclick="setDomain('${domain}')">
                        ${domain}
                    </button>
                `).join('')}
            </div>

            <div class="filters">
                <span style="font-size: 12px; color: var(--text-secondary); align-self: center; text-transform: uppercase; font-weight: 600; margin-right: 10px;">Difficulty:</span>
                <button class="filter-chip ${!state.selectedDifficulty ? 'active' : ''}" onclick="setDifficulty(null)">All Levels</button>
                ${difficulties.map(diff => `
                    <button class="filter-chip ${state.selectedDifficulty === diff ? 'active' : ''}" onclick="setDifficulty('${diff}')">
                        ${diff.charAt(0).toUpperCase() + diff.slice(1)}
                    </button>
                `).join('')}
            </div>

            <div class="question-card">
                <div class="question-header">
                    <div>
                        <div class="question-number">Question ${state.currentQuestionIndex + 1} of ${questions.length}</div>
                        <div class="question-meta">
                            <span class="badge badge-domain">${question.domain}</span>
                            <span class="badge badge-difficulty ${question.difficulty}">${question.difficulty}</span>
                        </div>
                    </div>
                    <button class="bookmark-btn ${state.bookmarked.has(question.id) ? 'bookmarked' : ''}" onclick="toggleBookmark(${question.id})">★</button>
                </div>

                <div class="question-text">${question.question}</div>

                <div class="options">
                    ${question.options.map((option, index) => {
                        const isSelected = selectedAnswer === index;
                        const isCorrect = index === question.correctAnswer;
                        let optionClass = '';
                        
                        if (selectedAnswer !== undefined) {
                            if (isSelected && isCorrect) optionClass = 'correct';
                            else if (isSelected && !isCorrect) optionClass = 'incorrect';
                            else if (isCorrect) optionClass = 'correct';
                        } else if (isSelected) {
                            optionClass = 'selected';
                        }

                        return `
                            <button class="option ${optionClass}" onclick="selectAnswer(${question.id}, ${index})">
                                <span class="option-label">${String.fromCharCode(65 + index)}</span>
                                <span>${option}</span>
                            </button>
                        `;
                    }).join('')}
                </div>

                ${selectedAnswer !== undefined ? `
                    <div class="explanation">
                        <strong>💡 Explanation:</strong> ${question.explanation}
                    </div>
                ` : ''}
            </div>

            <div class="buttons-group">
                <button class="btn btn-secondary" onclick="prevQuestion()" ${state.currentQuestionIndex === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="btn btn-secondary" disabled>${state.currentQuestionIndex + 1} / ${questions.length}</button>
                <button class="btn btn-primary" onclick="nextQuestion()" ${state.currentQuestionIndex === questions.length - 1 ? 'disabled' : ''}>Next →</button>
            </div>
        `;
        document.getElementById('contentArea').innerHTML = html;
    }

    // Render Exam View
    function renderExam() {
        if (!state.examStarted) {
            const html = `
                <div style="max-width: 600px; margin: 0 auto;">
                    <div class="question-card">
                        <h2 style="margin-bottom: 20px; color: var(--primary);">CISSP Mock Exam</h2>
                        <div style="line-height: 1.8; margin-bottom: 30px; color: var(--text-secondary);">
                            <p style="margin-bottom: 10px;">📋 <strong>Format:</strong> Full exam with all questions</p>
                            <p style="margin-bottom: 10px;">⏱️ <strong>Time Limit:</strong> 3 hours</p>
                            <p style="margin-bottom: 10px;">✔️ <strong>Passing Score:</strong> ~70-75%</p>
                            <p style="margin-bottom: 10px;">📊 <strong>Format:</strong> Multiple choice with one correct answer</p>
                        </div>
                        <div style="background: rgba(245, 158, 11, 0.1); padding: 15px; border-radius: 8px; border-left: 3px solid var(--warning); margin-bottom: 30px;">
                            <strong>⚠️ Important:</strong> This is a timed exam. Once you start, you cannot pause.
                        </div>
                        <button class="btn btn-primary" onclick="startExam()" style="width: 100%; padding: 12px;">Start Exam</button>
                    </div>
                </div>
            `;
            document.getElementById('contentArea').innerHTML = html;
        } else {
            const questions = getFilteredQuestions();
            const question = questions[state.currentQuestionIndex];
            const selectedAnswer = state.selectedAnswers[question.id];

            const html = `
                <div class="question-card">
                    <div class="question-header">
                        <div>
                            <div class="question-number">Question ${state.currentQuestionIndex + 1} of ${questions.length}</div>
                            <div class="question-meta">
                                <span class="badge badge-domain">${question.domain}</span>
                                <span class="badge badge-difficulty ${question.difficulty}">${question.difficulty}</span>
                            </div>
                        </div>
                    </div>

                    <div class="question-text">${question.question}</div>

                    <div class="options">
                        ${question.options.map((option, index) => {
                            const isSelected = selectedAnswer === index;
                            const optionClass = isSelected ? 'selected' : '';

                            return `
                                <button class="option ${optionClass}" onclick="selectAnswer(${question.id}, ${index})">
                                    <span class="option-label">${String.fromCharCode(65 + index)}</span>
                                    <span>${option}</span>
                                </button>
                            `;
                        }).join('')}
                    </div>
                </div>

                <div class="buttons-group">
                    <button class="btn btn-secondary" onclick="prevQuestion()" ${state.currentQuestionIndex === 0 ? 'disabled' : ''}>← Previous</button>
                    <button class="btn btn-secondary" disabled>${state.currentQuestionIndex + 1} / ${questions.length}</button>
                    ${state.currentQuestionIndex === questions.length - 1 
                        ? `<button class="btn btn-primary" onclick="finishExam()">Finish Exam ✓</button>`
                        : `<button class="btn btn-primary" onclick="nextQuestion()">Next →</button>`
                    }
                </div>
            `;
            document.getElementById('contentArea').innerHTML = html;
        }
    }

    // Render Bookmarks View
    function renderBookmarks() {
        const bookmarkedQuestions = CISSP_QUESTIONS.filter(q => state.bookmarked.has(q.id));
        
        if (bookmarkedQuestions.length === 0) {
            document.getElementById('contentArea').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⭐</div>
                    <div class="empty-state-title">No Bookmarked Questions</div>
                    <p>Bookmark questions while studying to review them later</p>
                </div>
            `;
            return;
        }

        let html = '';
        bookmarkedQuestions.forEach((question, idx) => {
            const selectedAnswer = state.selectedAnswers[question.id];
            const isCorrect = selectedAnswer === question.correctAnswer;

            let optionsHtml = question.options.map((option, index) => {
                const isSelected = selectedAnswer === index;
                let optionClass = '';
                
                if (selectedAnswer !== undefined) {
                    if (isSelected && isCorrect) optionClass = 'correct';
                    else if (isSelected && !isCorrect) optionClass = 'incorrect';
                    else if (index === question.correctAnswer) optionClass = 'correct';
                } else if (isSelected) {
                    optionClass = 'selected';
                }

                return `
                    <button class="option ${optionClass}" onclick="selectAnswer(${question.id}, ${index})">
                        <span class="option-label">${String.fromCharCode(65 + index)}</span>
                        <span>${option}</span>
                    </button>
                `;
            }).join('');

            html += `
                <div class="question-card">
                    <div class="question-header">
                        <div>
                            <div class="question-number">Question ${idx + 1} of ${bookmarkedQuestions.length}</div>
                            <div class="question-meta">
                                <span class="badge badge-domain">${question.domain}</span>
                                <span class="badge badge-difficulty ${question.difficulty}">${question.difficulty}</span>
                            </div>
                        </div>
                        <button class="bookmark-btn bookmarked" onclick="toggleBookmark(${question.id})">★</button>
                    </div>

                    <div class="question-text">${question.question}</div>

                    <div class="options">${optionsHtml}</div>

                    ${selectedAnswer !== undefined ? `
                        <div class="explanation">
                            <strong>💡 Explanation:</strong> ${question.explanation}
                        </div>
                    ` : ''}
                </div>
            `;
        });

        document.getElementById('contentArea').innerHTML = html;
    }

    // Render Results View
    function renderResults() {
        const stats = getStats();
        let domainHtml = Object.entries(stats.domainStats).map(([domain, data]) => {
            const percentage = ((data.correct / data.total) * 100).toFixed(0);
            return `
                <div style="margin-bottom: 25px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span style="font-size: 14px; font-weight: 500;">${domain}</span>
                        <span style="color: var(--primary); font-weight: 600;">${data.correct}/${data.total} (${percentage}%)</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percentage}%"></div>
                    </div>
                </div>
            `;
        }).join('');

        const html = `
            <div class="dashboard">
                <div class="dashboard-card">
                    <div class="dashboard-card-title">Final Accuracy</div>
                    <div class="dashboard-card-value">${stats.accuracy}%</div>
                    <div class="dashboard-card-subtitle">${stats.correctAnswers} of ${stats.questionsAnswered} correct</div>
                </div>
                <div class="dashboard-card">
                    <div class="dashboard-card-title">Exam Status</div>
                    <div class="dashboard-card-value">${stats.accuracy >= 75 ? '✅ PASS' : '❌ FAIL'}</div>
                    <div class="dashboard-card-subtitle">Passing score: 70-75%</div>
                </div>
            </div>

            <div class="question-card">
                <h3 style="margin-bottom: 20px; color: var(--primary);">Domain Performance</h3>
                ${domainHtml}
            </div>
        `;
        document.getElementById('contentArea').innerHTML = html;
    }

    // Render Study Guide View
    function renderStudyGuide() {
        const domains = [...new Set(CISSP_QUESTIONS.map(q => q.domain))];
        
        const studyGuide = {
            'Security & Risk Management': [
                '• Risk Assessment: Identify, analyze, and evaluate risks',
                '• Risk Treatment: Mitigation, acceptance, avoidance, or transfer',
                '• Business Impact Analysis: Quantify impact of disruptions',
                '• Governance Framework: Policies, procedures, and oversight',
                '• Compliance: Regulatory requirements and standards'
            ],
            'Asset Security': [
                '• Data Classification: Levels and protection requirements',
                '• Data Lifecycle: Creation, use, archival, and destruction',
                '• Media Management: Secure handling and disposal',
                '• Encryption: Data at rest and in transit',
                '• Access Controls: Physical and logical security'
            ],
            'Security Architecture & Design': [
                '• Least Privilege: Minimum necessary access',
                '• Defense in Depth: Multiple overlapping controls',
                '• Network Segmentation: Isolation and zone boundaries',
                '• Cloud Security: Shared responsibility model',

            ],
            'Communication & Network Security': [

            ],
            'Identity & Access Management': [

                '• Identity Governance: Provisioning and deprovisioning',
                '• RBAC vs ABAC: Role-based and attribute-based control',

            ],

                <div class="question-card" style="margin-bottom: 20px;">

                        ${domain}
                        <span style="font-size: 14px; float: right;">▼</span>
                    </h3>
                    <div class="study-guide-content">
                        ${studyGuide[domain]?.map(point => `<div class="study-guide-point">${point}</div>`).join('')}

    // Event Handlers
    function selectAnswer(questionId, answerIndex) {
        state.selectedAnswers[questionId] = answerIndex;
        
        const question = CISSP_QUESTIONS.find(q => q.id === questionId);
        state.progress[questionId] = {
            correct: answerIndex === question.correctAnswer,
            timestamp: Date.now()
        };

        saveData();
        updateHeader();
        
        // Re-render current view
        const viewHandlers = {
            'dashboard': renderDashboard,
            'practice': renderPractice,
            'exam': renderExam,
            'bookmarks': renderBookmarks,
            'results': renderResults,
            'study': renderStudyGuide
        };
        viewHandlers[state.currentView]?.();
    }

    function toggleBookmark(questionId) {
        if (state.bookmarked.has(questionId)) {
            state.bookmarked.delete(questionId);
        } else {
            state.bookmarked.add(questionId);
        }
        saveData();
        
        const viewHandlers = {
            'dashboard': renderDashboard,
            'practice': renderPractice,
            'exam': renderExam,
            'bookmarks': renderBookmarks,
            'results': renderResults,
            'study': renderStudyGuide
        };
        viewHandlers[state.currentView]?.();
    }

    function nextQuestion() {
        const questions = getFilteredQuestions();
        if (state.currentQuestionIndex < questions.length - 1) {
            state.currentQuestionIndex++;
            const viewHandlers = {
                'dashboard': renderDashboard,
                'practice': renderPractice,
                'exam': renderExam,
                'bookmarks': renderBookmarks,
                'results': renderResults,
                'study': renderStudyGuide
            };
            viewHandlers[state.currentView]?.();
        }
    }

    function prevQuestion() {
        if (state.currentQuestionIndex > 0) {
            state.currentQuestionIndex--;
            const viewHandlers = {
                'dashboard': renderDashboard,
                'practice': renderPractice,
                'exam': renderExam,
                'bookmarks': renderBookmarks,
                'results': renderResults,
                'study': renderStudyGuide
            };
            viewHandlers[state.currentView]?.();
        }
    }

    function setDomain(domain) {
        state.selectedDomain = domain;
        state.currentQuestionIndex = 0;
        renderPractice();
    }

    function setDifficulty(difficulty) {
        state.selectedDifficulty = difficulty;
        state.currentQuestionIndex = 0;
        renderPractice();
    }

    function startExam() {
        state.examStarted = true;
        state.currentQuestionIndex = 0;
        state.selectedAnswers = {};
        renderExam();
    }

    function finishExam() {
        state.examStarted = false;
        state.currentView = 'results';
        updateNavigation();
        renderResults();
    }

    function toggleStudyGuide(domain) {
        // Simple toggle for study guide
        renderStudyGuide();
    }

    // Theme Toggle
    function toggleTheme() {
        const body = document.body;
        const toggle = document.getElementById('themeToggle');
        
        body.classList.toggle('light-mode');
        
        // Update toggle button icon
        if (body.classList.contains('light-mode')) {
            toggle.textContent = '☀️';
            toggle.title = 'Switch to dark mode';
            localStorage.setItem('theme', 'light');
        } else {
            toggle.textContent = '🌙';
            toggle.title = 'Switch to light mode';
            localStorage.setItem('theme', 'dark');
        }
    }

    // Load theme preference
    function loadTheme() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        const body = document.body;
        const toggle = document.getElementById('themeToggle');
        
        if (savedTheme === 'light') {
            body.classList.add('light-mode');
            toggle.textContent = '☀️';
            toggle.title = 'Switch to dark mode';
        } else {
            body.classList.remove('light-mode');
            toggle.textContent = '🌙';
            toggle.title = 'Switch to light mode';
        }
    }

    // Navigation
    function updateNavigation() {
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.classList.remove('active');
        });
        document.querySelector(`[data-view="${state.currentView}"]`)?.classList.add('active');

        const titles = {
            'dashboard': 'Dashboard',
            'practice': 'Practice Mode',
            'exam': 'Mock Exam',
            'bookmarks': 'Bookmarked Questions',
            'results': 'Performance Results',
            'study': 'Study Guide'
        };
        document.getElementById('headerTitle').textContent = titles[state.currentView];
    }

    function switchView(view) {
        state.currentView = view;
        state.currentQuestionIndex = 0;
        updateNavigation();
        updateHeader();

        const viewHandlers = {
            'dashboard': renderDashboard,
            'practice': renderPractice,
            'exam': renderExam,
            'bookmarks': renderBookmarks,
            'results': renderResults,
            'study': renderStudyGuide
        };
        viewHandlers[view]?.();
    }

    // Initialize
    // Load theme first
    loadTheme();
    
    // Set up event listeners
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
            switchView(e.target.closest('.nav-item').dataset.view);
        });
    });

    // Load data and render
    loadData();
    updateHeader();
    renderDashboard();
</script>
